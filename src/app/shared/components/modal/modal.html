<!-- OVERLAY -->
<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm"
  (click)="close.emit()"
>
  <!-- CONTENEDOR -->
  <div class="relative w-full max-w-2xl px-4" (click)="$event.stopPropagation()">
    <!-- CARD -->
    <div class="rounded-lg bg-white shadow-lg dark:bg-gray-800">
      <!-- HEADER -->
      <div class="flex items-center justify-between border-b px-4 py-3 dark:border-gray-700">
        <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-200">
          <!-- título dinámico después -->
          {{ title() }}
        </h3>

        <button
          (click)="close.emit()"
          class="text-gray-400 transition-colors hover:text-gray-600 dark:hover:text-gray-200"
        >
          ✕
        </button>
      </div>

      <!-- CONTENT -->
      <div class="p-4">
        <ng-content />
      </div>
    </div>
  </div>
</div>
