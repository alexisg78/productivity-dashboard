<div class="mx-auto max-w-3xl space-y-6">
  <h1 class="text-2xl font-semibold text-slate-200">Configuraciones</h1>

  <!-- TASK SETTINGS -->
  <section
    class="space-y-4 rounded-xl bg-white p-6 shadow-md dark:divide-gray-700 dark:bg-gray-800"
  >
    <h2 class="text-lg font-medium text-slate-100">Tareas</h2>

    <!-- columns number -->
    <div class="flex flex-col gap-2">
      <label class="text-sm text-slate-400"> Cantidad de columnas </label>

      <input
        type="number"
        min="1"
        max="6"
        class="w-32 rounded-md border border-slate-600 bg-slate-700 px-3 py-2 text-slate-100 focus:ring-2 focus:ring-blue-500 focus:outline-none"
        [value]="cantColumns()"
        disabled
      />
    </div>

    <!-- column names -->
    <div class="space-y-2">
      <label class="text-sm text-slate-400"> Nombre de columnas </label>

      <div class="flex flex-col gap-2">
        @for (column of columns(); track $index) {
          <input
            type="text"
            class="rounded-md border border-slate-600 bg-slate-700 px-3 py-2 text-slate-100 focus:ring-2 focus:ring-blue-500"
            [value]="column.name"
            (input)="updateColumnName($index, $any($event.target).value)"
          />
        }
      </div>
    </div>

    <!-- todo -->
    <!-- <button class="mt-3 rounded-md bg-blue-600 px-4 py-2 text-white transition hover:bg-blue-700">
      Guardar cambios
    </button> -->

    <p class="text-xs text-slate-400">Los cambios se aplican automáticamente</p>
  </section>

  <!-- APPEARANCE -->
  <section class="space-y-4 rounded-xl p-6 shadow-md dark:divide-gray-700 dark:bg-gray-800">
    <h2 class="text-lg font-medium text-slate-100">Apariencia</h2>

    <div class="flex items-center justify-between">
      <span class="text-slate-300"> Modo oscuro </span>

      <input type="checkbox" class="accent-blue-600" />
    </div>

    <div class="flex items-center justify-between">
      <span class="text-slate-300"> Layout compacto </span>

      <input type="checkbox" class="accent-blue-600" />
    </div>
  </section>
</div>
