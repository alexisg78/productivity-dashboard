<custom-table [columns]="columns" [actions]="actions" [onAdd]="addExpense" [data]="expenses()" />

@if (showModal()) {
  <modal (close)="closeModal()" [title]="'Gastos Mensuales'">
    <expense-form
      [expense]="selectedExpense()"
      (save)="handleSave($event)"
      (cancel)="closeModal()"
    />
  </modal>
}
