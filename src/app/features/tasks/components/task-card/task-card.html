<div
  cdkDrag
  [cdkDragData]="task"
  class="flex cursor-move items-center justify-between rounded border-b border-gray-100 bg-white p-2 hover:bg-gray-50 dark:border-gray-900 dark:bg-gray-600 dark:hover:bg-gray-700"
>
  <span class="text-sm">
    {{ task().content }}
  </span>

  <div class="flex gap-2">
    <button
      title="Editar tarea"
      (click)="edit.emit(task())"
      class="rounded p-1.5 text-gray-400 transition-all duration-150 ease-in-out hover:bg-gray-100 hover:text-blue-500 dark:hover:bg-gray-500"
    >
      <i class="fa-solid fa-pen-to-square"></i>
    </button>

    <button
      title="Eliminar tarea"
      (click)="delete.emit(task().id)"
      class="rounded p-1.5 text-gray-400 transition-all duration-150 ease-in-out hover:bg-gray-100 hover:text-red-500 dark:hover:bg-gray-500"
    >
      <i class="fa-solid fa-trash-can"></i>
    </button>
  </div>
</div>
